<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha Solver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4cae4c;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            border-radius: 4px;
        }
        img {
            display: block;
            max-width: 100%;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Captcha Solver</h1>
    <div class="input-group">
        <label for="captchaUrl">Enter Captcha Image URL:</label>
        <input type="url" id="captchaUrl" placeholder="http://example.com/captcha.jpg">
    </div>
    <div class="input-group">
        <label for="captchaText">Or Enter Captcha Text Manually:</label>
        <input type="text" id="captchaText" placeholder="Enter captcha text here...">
    </div>
    <button id="solveBtn">Solve Captcha</button>

    <img id="captchaImage" src="" alt="" style="display: none;">
    <div id="result"></div>
</div>

<script>
    document.getElementById('solveBtn').addEventListener('click', function() {
        const url = document.getElementById('captchaUrl').value;
        const captchaText = document.getElementById('captchaText').value;

        if (url) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.blob();
                })
                .then(blob => {
                    const imgUrl = URL.createObjectURL(blob);
                    document.getElementById('captchaImage').src = imgUrl;
                    document.getElementById('captchaImage').style.display = 'block';
                    return extractTextFromImage(imgUrl);
                })
                .then(text => {
                    document.getElementById('result').innerText = `Solved Captcha: ${text}`;
                })
                .catch(err => {
                    document.getElementById('result').innerText = `Error: ${err.message}`;
                });
        } else if (captchaText) {
            document.getElementById('result').innerText = `Solved Captcha: ${captchaText}`;
        } else {
            document.getElementById('result').innerText = 'Please provide a URL or enter text.';
        }
    });

    function extractTextFromImage(imageUrl) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.crossOrigin = 'Anonymous';
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const dataUrl = canvas.toDataURL('image/png');

                const worker = Tesseract.createWorker();
                worker.load()
                    .then(() => worker.loadLanguage('eng'))
                    .then(() => worker.initialize('eng'))
                    .then(() => worker.setParameters({
                        tessedit_char_whitelist: '0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ',
                    }))
                    .then(() => worker.recognize(dataUrl))
                    .then(({ data: { text } }) => {
                        worker.terminate();
                        resolve(text.trim());
                    })
                    .catch(err => {
                        worker.terminate();
                        reject(err);
                    });
            };
            img.onerror = reject;
            img.src = imageUrl;
        });
    }
</script>
<script src="https://cdn.rawgit.com/naptha/tesseract.js/0.2.0/dist/tesseract.min.js"></script>
</body>
</html>
